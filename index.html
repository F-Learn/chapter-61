<script>
    // Chapter 61: Management of Patients With Neurologic Dysfunction – exact 37 questions from document
    const questions = [
        {
            id: 1,
            question: "1. A client is being admitted to the neurologic ICU following an acute head injury that has resulted in cerebral edema. When planning this client's care, the nurse would expect to administer what priority medication?",
            options: [
                "A. Hydrochlorothiazide",
                "B. Furosemide",
                "C. Mannitol",
                "D. Spironlactone"
            ],
            correct: 2, // C
            rationale: "The osmotic diuretic mannitol is given to dehydrate the brain tissue and reduce cerebral edema. This drug acts by reducing the volume of brain and extracellular fluid. Spironolactone, furosemide, and hydrochlorothiazide are diuretics that are not typically used in the treatment of increased ICP resulting from cerebral edema. (PTS:1 REF:p.2012)"
        },
        {
            id: 2,
            question: "2. The nurse is providing care for a client who is unconscious. What nursing intervention takes highest priority?",
            options: [
                "A. Maintaining accurate records of intake and output",
                "B. Maintaining a patent airway",
                "C. Inserting a nasogastric (NG) tube as prescribed",
                "D. Providing appropriate pain control"
            ],
            correct: 1, // B
            rationale: "Maintaining a patent airway always takes top priority, even though each of the other listed actions is necessary and appropriate. (PTS:1 REF:p.1994)"
        },
        {
            id: 3,
            question: "3. The nurse is caring for a client in the ICU who has a brain stem herniation and who is exhibiting an altered level of consciousness. Monitoring reveals that the client's mean arterial pressure (MAP) is 60 mm Hg with an intracranial pressure (ICP) reading of 5 mm Hg. What is the nurse's most appropriate action?",
            options: [
                "A. Position the client the high Fowler position as tolerated.",
                "B. Administer osmotic diuretics as prescribed.",
                "C. Participate in interventions to increase cerebral perfusion pressure (CPP).",
                "D. Prepare the client for craniotomy."
            ],
            correct: 2, // C
            rationale: "The CPP is 55 mm Hg, which is considered low. The normal CPP is 70 to 100 mm Hg. Clients with a CPP of less than 50 mm Hg experience irreversible neurologic damage. As a result, interventions are necessary. A craniotomy is not directly indicated. Diuretics and increased height of bed would exacerbate the client's condition. (PTS:1 REF:p.2000)"
        },
        {
            id: 4,
            question: "4. The nurse is caring for a client who is postoperative following a craniotomy. When writing the plan of care, the nurse identifies a diagnosis of 'deficient fluid volume related to fluid restriction and osmotic diuretic use.' What is the nurse's most appropriate intervention for this diagnosis?",
            options: [
                "A. Change the client's position as indicated.",
                "B. Monitor serum electrolytes.",
                "C. Maintain NPO status.",
                "D. Monitor arterial blood gas (ABG) values."
            ],
            correct: 1, // B
            rationale: "The postoperative fluid regimen depends on the type of neurosurgical procedure and is determined on an individual basis. The volume and composition of fluids are adjusted based on daily serum electrolyte values, along with fluid intake and output. Fluids may have to be restricted in clients with cerebral edema. Changing the client's position, maintaining an NPO status, and monitoring ABG values do not relate to the nursing diagnosis of deficient fluid volume. (PTS:1 REF:p.2014)"
        },
        {
            id: 5,
            question: "5. A client with a documented history of seizure disorder experiences a generalized seizure. What nursing action is most appropriate?",
            options: [
                "A. Restrain the client to prevent injury.",
                "B. Open the client's jaws to insert an oral airway.",
                "C. Place client in high Fowler position.",
                "D. Loosen the client's restrictive clothing."
            ],
            correct: 3, // D
            rationale: "An appropriate nursing intervention would include loosening any restrictive clothing on the client. No attempt should be made to restrain the client during the seizure because muscular contractions are strong and restraint can produce injury. Do not attempt to pry open jaws that are clenched in a spasm to insert anything. Broken teeth and injury to the lips and tongue may result from such an action. If possible, place the client on one side with head flexed forward, which allows the tongue to fall forward and facilitates drainage of saliva and mucus. (PTS:1 REF:p.2021)"
        },
        {
            id: 6,
            question: "6. A client who has been on long-term phenytoin therapy is admitted to the unit. In light of the adverse of effects of this medication, the nurse should prioritize which of the following in the client's plan of care?",
            options: [
                "A. Monitoring of pulse oximetry",
                "B. Administration of a low-protein diet",
                "C. Administration of thorough oral hygiene",
                "D. Fluid restriction as prescribed"
            ],
            correct: 2, // C
            rationale: "Gingival hyperplasia (swollen and tender gums) can be associated with long-term phenytoin use. Thorough oral hygiene should be provided consistently and encouraged after discharge. Fluid and protein restriction are contraindicated and there is no particular need for constant oxygen saturation monitoring. (PTS:1 REF:p.2022)"
        },
        {
            id: 7,
            question: "7. A client exhibiting an altered level of consciousness (LOC) due to blunt force trauma to the head is admitted to the emergency department (ED). The nurse should first gauge the client's LOC on the results of what diagnostic tool?",
            options: [
                "A. Monro-Kellie hypothesis",
                "B. Glasgow Coma scale",
                "C. Cranial nerve function",
                "D. Mental status examination"
            ],
            correct: 1, // B
            rationale: "LOC, a sensitive indicator of neurologic function, is assessed based on the criteria in the Glasgow Coma scale: eye opening, verbal response, and motor response. The Monro-Kellie hypothesis states that because of the limited space for expansion within the skull, an increase in any one of the components (blood, brain tissue, cerebrospinal fluid) causes a change in the volume of the others. Cranial nerve function and the mental status examination would be part of the neurologic examination for this client, but would not be the priority in evaluating LOC. Glasgow coma scale can be done quickly and establishes a baseline of neurologic function. (PTS:1 REF:p.1994)"
        },
        {
            id: 8,
            question: "8. The nurse is caring for a client with a brain tumor and is aware that the normal compensation measures to keep ICP (intracranial pressure) within normal limits may no longer be effective. What are the normal compensation measures for the brain? Select all that apply.",
            options: [
                "A. Displacing or shifting cerebral spinal fluid (CSF)",
                "B. Decreasing cerebral perfusion",
                "C. Increasing the absorption of CSF",
                "D. Shifting brain tissue",
                "E. Decreasing cerebral blood volume"
            ],
            correct: [0,2,4], // A, C, E
            rationale: "The Monro–Kellie hypothesis explains the dynamic equilibrium of cranial contents. This hypothesis states that because of the limited space for expansion within the skull, an increase in any one of the components causes a change in the volume of the others. The brain typically compensates for these changes by displacing or shifting CSF, increasing the absorption or diminishing the production of CSF, or decreasing cerebral blood volume. Without such changes, ICP begins to rise. A decrease in cerebral perfusion and shifting brain tissue are not normal compensatory events. An increase in ICP can occur because of a brain tumor. Increased ICP from any cause would result in a decrease in cerebral perfusion which stimulates further edema and may shift brain tissue. A shift in brain tissue results in herniation which is a dire and frequently fatal event. (PTS:1 REF:p.2000)"
        },
        {
            id: 9,
            question: "9. A client with increased intracranial pressure (ICP) has a ventriculostomy for monitoring ICP. The nurse's most recent assessment reveals that the client is now exhibiting nuchal rigidity and photophobia. The nurse would be correct in suspecting the presence of what complication?",
            options: [
                "A. Encephalitis",
                "B. Cerebral spinal fluid leak",
                "C. Meningitis",
                "D. Catheter occlusion"
            ],
            correct: 2, // C
            rationale: "Complications of a ventriculostomy include ventricular infectious meningitis and problems with the monitoring system. Nuchal rigidity and photophobia are clinical manifestations of meningitis, but are not suggestive of encephalitis, a cerebral spinal fluid (CSF) leak, or an occluded catheter. (PTS:1 REF:p.2008)"
        },
        {
            id: 10,
            question: "10. The nurse is participating in the care of a client with increased ICP. What diagnostic test is contraindicated in this client's treatment?",
            options: [
                "A. Computed tomography (CT) scan",
                "B. Lumbar puncture",
                "C. Magnetic resonance imaging (MRI)",
                "D. Venous Doppler studies"
            ],
            correct: 1, // B
            rationale: "A lumbar puncture in a client with increased ICP may cause the brain to herniate from the withdrawal of fluid and change in pressure during the lumbar puncture. Herniation of the brain is a dire and frequently fatal event. CT, MRI, and venous Doppler are considered noninvasive procedures and they would not affect the ICP itself. (PTS:1 REF:p.2001)"
        },
        {
            id: 11,
            question: "11. The nurse is caring for a client who is in status epilepticus. What medication should the nurse anticipate administering to halt the seizure immediately?",
            options: [
                "A. Intravenous phenobarbital",
                "B. Intravenous diazepam",
                "C. Oral lorazepam",
                "D. Oral phenytoin"
            ],
            correct: 1, // B
            rationale: "Medical management of status epilepticus includes IV diazepam and IV lorazepam given slowly in an attempt to halt seizures immediately. Other medications (phenytoin, phenobarbital) are given later to maintain a seizure-free state. Oral medications are not given during status epilepticus. (PTS:1 REF:p.2026)"
        },
        {
            id: 12,
            question: "12. The nurse has created a plan of care for a client who is at risk for increased ICP. The client's care plan should specify monitoring for what early sign of increased ICP?",
            options: [
                "A. Disorientation and restlessness",
                "B. Decreased pulse and respirations",
                "C. Projectile vomiting",
                "D. Loss of corneal reflex"
            ],
            correct: 0, // A
            rationale: "Early indicators of ICP include disorientation and restlessness. Later signs include decreased pulse and respirations, projectile vomiting, and loss of brain stem reflexes, such as the corneal reflex. (PTS:1 REF:p.2009)"
        },
        {
            id: 13,
            question: "13. The neurologic ICU nurse is admitting a client with increased intracranial pressure. How should the nurse best position the client?",
            options: [
                "A. Position the client supine.",
                "B. Maintain head of bed (HOB) elevated at 30 to 45 degrees.",
                "C. Position client in prone position.",
                "D. Maintain bed in Trendelenburg position."
            ],
            correct: 1, // B
            rationale: "The client with increased ICP should be placed with the HOB elevated 30 to 45 degrees, with the neck in neutral alignment. Each of the other listed positions would cause a dangerous elevation in ICP. (PTS:1 REF:p.2005)"
        },
        {
            id: 14,
            question: "14. A clinic nurse is caring for a client diagnosed with migraine headaches. During the client teaching session, the client questions the nurse regarding alcohol consumption. What would the nurse be correct in telling the client about the effects of alcohol?",
            options: [
                "A. Alcohol causes hormone fluctuations.",
                "B. Alcohol causes vasodilation of the blood vessels.",
                "C. Alcohol has an excitatory effect on the CNS.",
                "D. Alcohol diminishes endorphins in the brain."
            ],
            correct: 1, // B
            rationale: "Alcohol causes vasodilation of the blood vessels and may exacerbate migraine headaches. Alcohol has a depressant effect on the CNS. Alcohol does not cause hormone fluctuations, nor does it decrease endorphins (morphine-like substances produced by the body) in the brain. (PTS:1 REF:p.2028)"
        },
        {
            id: 15,
            question: "15. A client has developed diabetes insipidus after having increased ICP following head trauma. What nursing assessment best addresses this complication?",
            options: [
                "A. Vigilant monitoring of fluid balance",
                "B. Continuous BP monitoring",
                "C. Serial arterial blood gases (ABGs)",
                "D. Monitoring of the client's airway for patency"
            ],
            correct: 0, // A
            rationale: "Diabetes insipidus requires fluid and electrolyte replacement, along with the administration of vasopressin, to replace and slow the urine output. Because of these alterations in fluid balance, careful monitoring is necessary. None of the other listed assessments directly addresses the major manifestations of diabetes insipidus. (PTS:1 REF:p.2010)"
        },
        {
            id: 16,
            question: "16. What should the nurse suspect when hourly assessment of urine output on a client post craniotomy exhibits a urine output from a catheter of 1,500 mL for two consecutive hours?",
            options: [
                "A. Cushing syndrome",
                "B. Syndrome of inappropriate antidiuretic hormone (SIADH)",
                "C. Adrenal crisis",
                "D. Diabetes insipidus"
            ],
            correct: 3, // D
            rationale: "Diabetes insipidus is an abrupt onset of extreme polyuria that commonly occurs in clients after brain surgery. Cushing syndrome is excessive glucocorticoid secretion resulting in sodium and water retention. SIADH is the result of increased secretion of ADH; the client becomes volume-overloaded, urine output diminishes, and serum sodium concentration becomes dilute. Adrenal crisis is undersecretion of glucocorticoids resulting in profound hypoglycemia, hypovolemia, and hypotension. (PTS:1 REF:p.2008)"
        },
        {
            id: 17,
            question: "17. During the examination of an unconscious client, the nurse observes that the client's pupils are fixed and dilated. What is the most plausible clinical significance of the nurse's finding?",
            options: [
                "A. It suggests onset of metabolic problems.",
                "B. It indicates paralysis on the right side of the body.",
                "C. It indicates paralysis of cranial nerve X (CN X).",
                "D. It indicates an injury at the midbrain level."
            ],
            correct: 3, // D
            rationale: "Pupils that are fixed and dilated indicate injury at the midbrain level. This finding is not suggestive of unilateral paralysis, metabolic deficits, or damage to CN X. (PTS:1 REF:p.1996)"
        },

    let currentQuestion = 0;
    let selectedOption = null;
    let answers = Array(questions.length).fill(null);

    function loadQuestion() {
        const q = questions[currentQuestion];
        if (!q) return;

        const progress = ((currentQuestion + 1) / questions.length) * 100;
        document.getElementById('progressBar').style.width = `${progress}%`;
        document.getElementById('counter').textContent = `${currentQuestion + 1}/${questions.length}`;
        document.getElementById('questionNumber').textContent = q.id;

        document.getElementById('question').innerHTML = q.question;
        loadOptions(q);

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');

        document.getElementById('prevBtn').disabled = currentQuestion === 0;
        const stored = answers[q.id - 1];
        document.getElementById('nextBtn').disabled = stored === null || stored === undefined;
        document.getElementById('nextBtn').textContent = currentQuestion >= questions.length - 1 ? 'Finish ➡️' : 'Next ➡️';
    }

    function loadOptions(q) {
        const container = document.getElementById('options');
        container.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerHTML = `<div class="option-letter">${String.fromCharCode(65 + idx)}</div><div>${opt}</div>`;
            div.onclick = () => selectOption(idx);
            container.appendChild(div);
        });

        const saved = answers[q.id - 1];
        if (saved !== null && saved !== undefined) {
            selectOption(saved, true);
        }
    }

    function selectOption(index, fromMemory = false) {
        const q = questions[currentQuestion];
        if (!fromMemory && selectedOption !== null) return;

        if (!fromMemory) {
            selectedOption = index;
            answers[q.id - 1] = index;
        }

        highlightSelected(index, q);
        showFeedback(index, q);
        document.getElementById('nextBtn').disabled = false;
        document.getElementById('cancelBtn').classList.add('show');
    }

    function highlightSelected(index, q) {
        const opts = document.querySelectorAll('.option');
        opts.forEach((opt, i) => opt.classList.remove('correct', 'incorrect'));

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        if (Array.isArray(q.correct)) {
            correctIndices.forEach(ci => opts[ci]?.classList.add('correct'));
            if (!correctIndices.includes(index)) {
                opts[index]?.classList.add('incorrect');
            }
        } else {
            if (index === q.correct) {
                opts[index].classList.add('correct');
            } else {
                opts[index].classList.add('incorrect');
                opts[q.correct].classList.add('correct');
            }
        }
    }

    function showFeedback(index, q) {
        const fb = document.getElementById('feedback');
        const icon = document.getElementById('feedbackIcon');
        const text = document.getElementById('feedbackText');
        const rationaleDiv = document.getElementById('rationale');
        const rationaleP = document.getElementById('rationaleText');

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        const isCorrect = correctIndices.includes(index);

        if (isCorrect) {
            fb.className = 'feedback correct';
            icon.textContent = '✅';
            text.textContent = 'CORRECT! Well done.';
        } else {
            fb.className = 'feedback incorrect';
            icon.textContent = '❌';
            const letters = correctIndices.map(c => String.fromCharCode(65 + c)).join(', ');
            text.textContent = `INCORRECT. The correct answer(s): ${letters}`;
        }

        fb.style.display = 'flex';
        rationaleP.innerHTML = q.rationale;
        rationaleDiv.classList.add('show');
    }

    function cancelSelection() {
        const q = questions[currentQuestion];
        selectedOption = null;
        answers[q.id - 1] = null;
        document.querySelectorAll('.option').forEach(opt => opt.classList.remove('correct', 'incorrect'));
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');
        document.getElementById('nextBtn').disabled = true;
    }

    function nextCard() {
        if (currentQuestion < questions.length - 1) {
            currentQuestion++;
            selectedOption = null;
            loadQuestion();
        } else {
            currentQuestion = 0;
            loadQuestion();
        }
    }

    function previousCard() {
        if (currentQuestion > 0) {
            currentQuestion--;
            const q = questions[currentQuestion];
            selectedOption = answers[q.id - 1];
            loadQuestion();
        }
    }

    // keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        if (e.key >= '1' && e.key <= '4') selectOption(parseInt(e.key)-1);
        else if (e.key >= 'a' && e.key <= 'd') selectOption(e.key.charCodeAt(0)-97);
        else if (e.key >= 'A' && e.key <= 'D') selectOption(e.key.charCodeAt(0)-65);
        else if (e.key === 'ArrowLeft' && !document.getElementById('prevBtn').disabled) previousCard();
        else if (e.key === 'ArrowRight' && !document.getElementById('nextBtn').disabled) nextCard();
        else if (e.key === 'Escape' && document.getElementById('cancelBtn').classList.contains('show')) cancelSelection();
    });

    loadQuestion();
</script>
